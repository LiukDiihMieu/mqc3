name: Publish documents on GitHub pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install ".[dev]"
          python -m pip install jupyter-book jupytext

      - name: Build documentation with Jupyter Book
        # GitHub Pages serves this project site under /<repo>/, so MyST must
        # prefix every asset/link with that base path (leading slash, no trailing).
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: |
          cd docs/source
          ./build.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/source/_build/html

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
